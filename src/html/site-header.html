<header class="topbar">
  <a class="brand" href="#deals" aria-label="LekkeDeal home">
    <img class="brand-logo" src="assets/logo.png" alt="LekkeDeal" />
  </a>

  <label class="header-search" for="globalSearch">
    <span class="sr-only">Search deals</span>
    <input
      id="globalSearch"
      type="search"
      placeholder="Search deals, products, brands or retailers..."
    />
    <svg class="ui-icon search-icon" aria-hidden="true">
      <use href="#icon-search"></use>
    </svg>
  </label>

  <button
    class="mobile-menu-button"
    id="mobileMenuButton"
    type="button"
    aria-label="Open menu"
    aria-expanded="false"
    aria-controls="mobileNavDrawer"
  >
    <span class="hamburger-lines" aria-hidden="true"></span>
  </button>

  <aside class="top-actions" aria-label="Account and deal timing">
    <p class="raid-status" aria-live="polite">
      <span id="raidCountdown">Next Lekke Drop in: calculating...</span>
      <small id="headerLastUpdated">Checking latest specials...</small>
    </p>
    <button class="saved-top-button" id="savedHeaderButton" type="button">
      <svg class="ui-icon" aria-hidden="true">
        <use href="#icon-heart"></use>
      </svg>
      Saved Deals
      <strong id="savedCount">0</strong>
    </button>
    <section class="desktop-auth-actions" aria-label="Account actions">
      <button
        class="desktop-auth-button is-login"
        id="desktopLoginButton"
        type="button"
        data-auth-logged-out
      >
        Login
      </button>
      <button
        class="desktop-auth-button is-register"
        id="desktopRegisterButton"
        type="button"
        data-auth-logged-out
      >
        Register
      </button>
      <button
        class="desktop-auth-button is-account"
        id="desktopAccountButton"
        type="button"
        data-auth-logged-in
        aria-label="Open profile"
        title="Profile"
        hidden
      >
        <svg class="ui-icon profile-icon" aria-hidden="true">
          <use href="#icon-user"></use>
        </svg>
      </button>
    </section>
  </aside>
</header>

<aside
  class="mobile-nav-drawer"
  id="mobileNavDrawer"
  aria-label="Mobile account menu"
  hidden
>
  <header class="mobile-nav-head">
    <img src="assets/icon.png" alt="" aria-hidden="true" />
    <span>
      <strong>LekkeDeal</strong>
      <small>Deals, alerts and saved picks</small>
    </span>
    <button
      class="mobile-nav-close"
      id="mobileMenuClose"
      type="button"
      aria-label="Close menu"
    >
      <span aria-hidden="true">&times;</span>
    </button>
  </header>
  <section class="mobile-nav-panel" aria-label="Deal timing">
    <span id="mobileRaidCountdown">Next lekke drop loading...</span>
    <small id="mobileLastUpdated">Checking latest specials...</small>
  </section>
  <nav class="mobile-nav-actions" aria-label="Mobile menu actions">
    <p class="mobile-nav-label">My LekkeDeal</p>
    <button id="mobileSavedButton" type="button">
      <svg class="ui-icon" aria-hidden="true">
        <use href="#icon-heart"></use>
      </svg>
      Saved Deals
      <strong id="mobileSavedCount">0</strong>
    </button>
    <section class="mobile-nav-auth" aria-label="Account actions">
      <button
        class="mobile-auth-button is-login"
        id="mobileLoginButton"
        type="button"
        data-auth-logged-out
      >
        Login
      </button>
      <button
        class="mobile-auth-button is-register"
        id="mobileRegisterButton"
        type="button"
        data-auth-logged-out
      >
        <svg class="ui-icon" aria-hidden="true">
          <use href="#icon-check"></use>
        </svg>
        Register
      </button>
      <button
        class="mobile-auth-button is-account"
        id="mobileAccountButton"
        type="button"
        data-auth-logged-in
        hidden
      >
        <svg class="ui-icon" aria-hidden="true">
          <use href="#icon-user"></use>
        </svg>
        <span data-auth-user-label>Account</span>
      </button>
      <button
        class="mobile-auth-button is-logout"
        id="mobileLogoutButton"
        type="button"
        data-auth-logged-in
        hidden
      >
        Logout
      </button>
    </section>
    <p class="mobile-nav-label">Browse</p>
    <a href="#deals">
      <svg class="ui-icon" aria-hidden="true">
        <use href="#icon-tag"></use>
      </svg>
      All Deals
    </a>
    <a href="reviews.html">
      <svg class="ui-icon" aria-hidden="true">
        <use href="#icon-star"></use>
      </svg>
      Community Reviews
    </a>
  </nav>
  <section class="mobile-nav-install" aria-label="Install LekkeDeal">
    <button id="mobileInstallButton" type="button" data-install-app>
      Install web-app
    </button>
  </section>
</aside>
